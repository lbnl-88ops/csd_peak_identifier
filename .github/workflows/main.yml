name: Release executable
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
jobs:
  windows_build:
    name: Windows Build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 
      - name: Set up python
        uses: actions/setup-python@v5 
        with:
          python-version: 3.13
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with windows-build
      - name: Build executable
        run: poetry run pyinstaller --noconsole --name peak_identifier --onedir --icon icon.ico --add-data "icon.png;." --add-data "data;data" app.py
      - name: Build installer
        run: |
          $nsisPath = Get-ChildItem -Path "C:\Program Files*" -Filter "makensis.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty DirectoryName
          if ($nsisPath) {
            Write-Host "Found NSIS at: $nsisPath"
            & "$nsisPath\makensis.exe" installer.nsi
          } else {
            Write-Error "makensis.exe not found in C:\Program Files or C:\Program Files (x86)"
            exit 1
          }
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: ./CSD_Peak_Identifier_Installer.exe
          prerelease: ${{ github.ref_name == 'main' && 'false' || 'true'}}
