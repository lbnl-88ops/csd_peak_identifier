name: Release executable
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
jobs:
  windows_build:
    name: Windows Build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 
      - name: Set up python
        uses: actions/setup-python@v5 
        with:
          python-version: 3.13
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with windows-build
      - name: Build executable
        run: poetry run pyinstaller --noconsole --name peak_identifier --onefile app.py
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/peak_identifier.exe
          prerelease: ${{ github.ref_name == 'main' && 'false' || 'true'}}
